# skill-drift.yml — CI workflow for skill drift detection
#
# Runs on pull requests, checks for drifted skills, and posts a review
# with inline comments on affected files.
#
# Generated by RepoSkills. This is a GitHub Actions workflow.
# For other CI platforms (GitLab CI, Azure DevOps, CircleCI, etc.),
# adapt the core logic: run skill-drift.sh --json, parse output, post PR comment.

name: Skill Drift Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  skill-drift:
    name: skill-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff against skill anchors

      - name: Run skill drift check
        id: drift
        shell: bash
        run: |
          # Run the drift check in JSON mode
          chmod +x .ai/skills/Tools/skill-drift.sh
          bash .ai/skills/Tools/skill-drift.sh --json > /tmp/skill-drift.json 2>/tmp/skill-drift-err.txt || true
          # Validate JSON output
          if ! python3 -c "import json,sys; json.load(open('/tmp/skill-drift.json'))" 2>/dev/null; then
            echo "Drift script stderr:" && cat /tmp/skill-drift-err.txt || true
            echo '{"drifts":[],"unmapped":[]}' > /tmp/skill-drift.json
          fi
          # Set drift status
          if bash .ai/skills/Tools/skill-drift.sh --quiet 2>/dev/null; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR review
        if: steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const driftJson = JSON.parse(fs.readFileSync('/tmp/skill-drift.json', 'utf8'));
            const drifts = driftJson.drifts || [];
            const unmapped = driftJson.unmapped || [];
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- skill-drift-review -->';

            // Build the review summary body
            let body = `${marker}\n## Skill Drift Report\n\n`;

            if (drifts.length > 0) {
              body += `### Skills that may need updating\n\n`;
              for (const d of drifts) {
                body += `- **${d.skill}** (last updated: ${d.anchor_date})\n`;
                body += `  - ${d.commit_count} commit(s) with changes in: ${d.dirs}\n`;
                if (d.not_mentioned) {
                  body += `  - Not mentioned in skill: ${d.not_mentioned}\n`;
                }
              }
              body += '\n';
            }

            if (unmapped.length > 0) {
              body += `### Directories with no skill coverage\n\n`;
              for (const dir of unmapped) {
                body += `- \`${dir}/\` — not in CLAUDE.md Module Routing table\n`;
              }
              body += '\n';
            }

            body += `---\n*Resolve individual comments below, or update the skill files to clear this report.*`;

            // Find existing review from this bot
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existingReview = reviews.data.find(r =>
              r.user.login === 'github-actions[bot]' &&
              r.body && r.body.includes(marker)
            );

            // Build inline comments — one per drifted skill on first changed file
            const comments = [];
            const latestCommit = context.payload.pull_request.head.sha;

            for (const d of drifts) {
              if (!d.first_file) continue;

              let commentBody = `**Skill drift:** \`${d.skill}\` hasn't been updated since ${d.anchor_date} (${d.commit_count} commits ago).\n\n`;
              commentBody += `This file is in a directory covered by that skill. Directories with changes: ${d.dirs}`;
              if (d.not_mentioned) {
                commentBody += `\n\n\`${d.not_mentioned}\` is not mentioned in the skill file at all.`;
              }
              commentBody += `\n\n<!-- skill-drift:${d.skill} -->`;

              comments.push({
                path: d.first_file,
                position: 1,
                body: commentBody,
              });
            }

            // For unmapped directories, find a changed file to comment on
            const prFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            for (const dir of unmapped) {
              const file = prFiles.data.find(f => f.filename.startsWith(dir + '/'));
              if (!file) continue;

              comments.push({
                path: file.filename,
                position: 1,
                body: `**No skill coverage:** \`${dir}/\` is not in the CLAUDE.md Module Routing table. Consider adding it to a skill's routing.\n\n<!-- skill-drift:unmapped:${dir} -->`,
              });
            }

            // Don't re-post comments that already exist
            const existingComments = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existingMarkers = new Set();
            for (const c of existingComments.data) {
              if (c.body && c.body.includes('<!-- skill-drift:')) {
                const match = c.body.match(/<!-- skill-drift:(.+?) -->/);
                if (match) existingMarkers.add(match[1]);
              }
            }

            const newComments = comments.filter(c => {
              const match = c.body.match(/<!-- skill-drift:(.+?) -->/);
              return match ? !existingMarkers.has(match[1]) : true;
            });

            if (existingReview) {
              await github.rest.pulls.updateReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                review_id: existingReview.id,
                body: body,
              });
            }

            if (newComments.length > 0 || !existingReview) {
              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: latestCommit,
                  body: existingReview ? undefined : body,
                  event: 'COMMENT',
                  comments: newComments,
                });
              } catch (e) {
                if (!existingReview) {
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: latestCommit,
                    body: body,
                    event: 'COMMENT',
                    comments: [],
                  });
                }
                core.warning(`Could not place inline comments: ${e.message}`);
              }
            }

      - name: Clean up review when no drift
        if: steps.drift.outputs.has_drift == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- skill-drift-review -->';
            const prNumber = context.payload.pull_request.number;

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existingReview = reviews.data.find(r =>
              r.user.login === 'github-actions[bot]' &&
              r.body && r.body.includes(marker)
            );

            if (existingReview) {
              await github.rest.pulls.updateReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                review_id: existingReview.id,
                body: `${marker}\n## Skill Drift Report\n\nAll skills up to date. No drift detected.`,
              });
            }
